<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Saharla Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --brown:#7B3F00; --orange:#C85A00; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(160deg,#3d1500 0%,var(--brown) 60%,#8b3500 100%);
      text-align:center;
      padding:24px;
    }
    .card {
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:24px;
      padding:56px 48px;
      max-width:500px;
      width:100%;
      backdrop-filter:blur(12px);
    }
    img { height:80px; margin:0 auto 28px; }
    .code {
      font-family:'Playfair Display',serif;
      font-size:6rem;
      font-weight:700;
      color:rgba(255,255,255,.15);
      line-height:1;
      margin-bottom:8px;
    }
    h1 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; margin-bottom:12px; }
    p  { color:rgba(255,255,255,.7); font-size:.95rem; line-height:1.7; margin-bottom:32px; }
    a  {
      display:inline-block;
      padding:13px 32px;
      background:linear-gradient(135deg,var(--brown),var(--orange));
      color:#fff;
      border-radius:50px;
      font-weight:600;
      font-size:.95rem;
      text-decoration:none;
      box-shadow:0 6px 20px rgba(0,0,0,.25);
      transition:transform .2s,box-shadow .2s;
    }
    a:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.35); }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/logo.png" alt="Saharla Foundation" />
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <a href="index.html">Return to Home</a>
  </div>
</body>
</html>
